services:
  backend:
    build:
      context: ./drift-book-lite/backend
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      DATABASE_URL: file:/data/dev.db
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-password}
      APP_BASE_URL: http://localhost:${FRONTEND_PORT:-5174}
      MATERIALS_DIR: /app/materials
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./materials:/app/materials:ro
      - backend_data:/data
      - backend_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./drift-book-lite/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "${FRONTEND_PORT:-5174}:80"
    depends_on:
      - backend
    restart: unless-stopped

  admin-frontend:
    build:
      context: ./drift-book-lite/admin-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${ADMIN_FRONTEND_API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "${ADMIN_FRONTEND_PORT:-5175}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
  backend_uploads:
