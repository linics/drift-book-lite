services:
  backend:
    build:
      context: ./drift-book-lite/backend
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      DATABASE_URL: file:/data/dev.db
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-admin1,admin2,admin3}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-password}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5174}
      ADMIN_APP_BASE_URL: ${ADMIN_APP_BASE_URL:-http://localhost:5175}
      DEFAULT_SITE_ASSETS_DIR: /app/resources/default-site-assets
      DEFAULT_SENSITIVE_WORDS_DIR: /app/resources/default-sensitive-words
      STUDENT_ROSTER_PATH: /app/resources/student-roster/2025学年学生信息.xls
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./drift-book-lite/resources/default-site-assets:/app/resources/default-site-assets:ro
      - ./drift-book-lite/resources/default-sensitive-words:/app/resources/default-sensitive-words:ro
      - ./2025学年学生信息.xls:/app/resources/student-roster/2025学年学生信息.xls:ro
      - backend_data:/data
      - backend_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./drift-book-lite/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "${FRONTEND_PORT:-5174}:80"
    depends_on:
      - backend
    restart: unless-stopped

  admin-frontend:
    build:
      context: ./drift-book-lite/admin-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${ADMIN_FRONTEND_API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "${ADMIN_FRONTEND_PORT:-5175}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
  backend_uploads:
